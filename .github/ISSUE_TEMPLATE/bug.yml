name: Bug report
description: Something doesn't work as expected.
labels: ["bug"]
body:
  - type: input
    id: version
    attributes:
      label: rust-rapport version
      description: Run `rust-rapport --version`.
      placeholder: "0.1.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Linux
        - macOS
        - Windows
        - Other / multiple
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: The exact commands you ran, and ideally the clippy JSON input (or a minimal subset of it) that triggers the bug.
      render: shell
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include stderr if relevant.
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Rust toolchain, environment (GitHub Actions runner, local shell), anything else that helps.
